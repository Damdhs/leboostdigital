<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image — Artisans appels manqués</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1200px;height:630px;overflow:hidden;background:#06061a;}
.wrap{width:1200px;height:630px;background:#06061a;position:relative;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.05) 1px,transparent 1px);background-size:44px 44px;}
.glow-r{position:absolute;right:-120px;top:-120px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.2) 0%,transparent 70%);}
.glow-l{position:absolute;left:-80px;bottom:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.14) 0%,transparent 70%);}
.topbar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#6366f1,#06b6d4);}
.inner{position:absolute;inset:0;padding:52px 64px;display:flex;flex-direction:column;justify-content:space-between;}
.header{display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#6366f1,#06b6d4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;background:linear-gradient(90deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.badge{background:rgba(251,146,60,.15);border:1px solid rgba(251,146,60,.4);border-radius:30px;padding:8px 20px;font-size:13px;font-weight:700;color:#fb923c;letter-spacing:.08em;text-transform:uppercase;}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 0 16px;}
.eyebrow{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px;}
.title{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:#fff;line-height:1.07;letter-spacing:-.025em;max-width:700px;}
.metrics{display:flex;gap:18px;}
.metric{flex:1;border-radius:16px;padding:20px 22px;}
.metric-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.28);}
.metric-amber{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.28);}
.metric-green{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.28);}
.metric-num{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;line-height:1;margin-bottom:8px;}
.num-red{color:#f87171;}
.num-amber{color:#fb923c;}
.num-green{color:#4ade80;}
.metric-lbl{font-size:13px;color:rgba(255,255,255,.52);line-height:1.45;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid"></div>
  <div class="glow-r"></div>
  <div class="glow-l"></div>
  <div class="topbar"></div>
  <div class="inner">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-name">Le Boost Digital</div>
      </div>
      <div class="badge">Automatisation du flux d'appels</div>
    </div>
    <div class="body">
      <div class="eyebrow">Pour les artisans &amp; indépendants terrain</div>
      <div class="title">Chaque appel manqué est un chantier perdu</div>
    </div>
    <div class="metrics">
      <div class="metric metric-red">
        <div class="metric-num num-red">2×</div>
        <div class="metric-lbl">Un prospect rappelle rarement une deuxième fois</div>
      </div>
      <div class="metric metric-amber">
        <div class="metric-num num-amber">70%</div>
        <div class="metric-lbl">Des décisions se prennent dans la journée</div>
      </div>
      <div class="metric metric-green">
        <div class="metric-num num-green">1 seul</div>
        <div class="metric-lbl">Chantier récupéré rembourse la solution à l'année</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
